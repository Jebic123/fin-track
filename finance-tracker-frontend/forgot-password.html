<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FinTrack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <form class="login-form" id="forgotPasswordForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-field">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>

            <button type="submit" class="login-btn" style="margin-top: 10px;">
                <span>Send Reset Link</span>
                <i class='bx bx-send'></i>
            </button>
        </form>

        <div class="signup-link" style="margin-top: 30px;">
            <p>Remember your password? <a href="login.html">Back to Sign In</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
