<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FinTrack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <img src="logo.png" alt="FinTrack Logo" class="logo-image">
                <span>FinTrack</span>
            </div>
            <h2>New Password</h2>
            <p style="color: rgba(255,255,255,0.6); margin-top: 10px;">Please enter your new secure password.</p>
        </div>

        <form class="login-form" id="resetPasswordForm">
            <div class="input-group">
                <div class="input-field">
                    <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                    <i class='bx bx-lock-alt'></i>
                </div>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                    <i class='bx bx-check-shield'></i>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>Update Password</span>
            </button>
        </form>

        <div class="signup-link">
            <p>Remembered? <a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const resetPasswordForm = document.getElementById('resetPasswordForm');
        if (resetPasswordForm) {
            resetPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('newPassword').value;
                const confirm = document.getElementById('confirmPassword').value;
                const btn = resetPasswordForm.querySelector('.login-btn');
                
                if (password !== confirm) {
                    showToast('Mismatch', 'Passwords do not match.', false);
                    return;
                }

                // Get token from URL
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');

                if (!token) {
                    showToast('Error', 'Invalid reset link. No token found.', false);
                    return;
                }

                btn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i> <span>Updating...</span>';

                try {
                    const response = await fetch('http://localhost:5000/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        btn.style.background = '#10B981';
                        btn.innerHTML = '<i class="bx bx-check"></i> <span>Updated!</span>';
                        // Assuming showToast is globally available from script.js logic if attached to window, 
                        // but here we just use the one in script.js which we already loaded.
                        showToast('Success!', result.message);
                        setTimeout(() => window.location.href = 'login.html', 2500);
                    } else {
                        btn.innerHTML = '<span>Update Password</span>';
                        showToast('Reset Failed', result.message, false);
                    }
                } catch (error) {
                    btn.innerHTML = '<span>Update Password</span>';
                    showToast('Error', 'Could not connect to server.', false);
                }
            });
        }
    </script>
</body>
</html>
