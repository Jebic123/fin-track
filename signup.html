<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FinTrack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container" style="max-width: 440px;">
        <i class='bx bx-x close-btn'></i>
        <div class="login-header">
            <h2>Register</h2>
        </div>

        <form class="login-form" id="signupForm">
            <div class="input-group">
                <div class="input-field">
                    <input type="text" id="name" placeholder="Full Name" required>
                    <i class='bx bx-user'></i>
                </div>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="email" id="email" placeholder="Email Address" required>
                    <i class='bx bx-envelope'></i>
                </div>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="password" id="password" placeholder="Password" required>
                    <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                </div>
            </div>

            <div class="form-options" style="justify-content: flex-start; margin-top: 5px;">
                <label class="remember-me">
                    <input type="checkbox" id="terms" required>
                    <span class="checkmark"></span>
                    I agree to the <a href="#" style="color: rgba(255,255,255,0.8); text-decoration: underline; margin-left: 4px;">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="login-btn">
                <span>Create Account</span>
            </button>
        </form>

        <div class="signup-link">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
